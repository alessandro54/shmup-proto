<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- CRITICAL: lock viewport. No zoom, no scale, fit device width. -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <title>Gravity Well Proto</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: #111;
        overflow: hidden; /* kill scroll */
        overscroll-behavior: none; /* kill pull-to-refresh */
      }
      #game {
        width: 100%;
        height: 100%;
        /* CRITICAL: stop the browser from hijacking touches for
           scroll / pinch-zoom / double-tap-zoom. */
        touch-action: none;
        -webkit-user-select: none;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
      }
      canvas {
        display: block;
        touch-action: none;
      }
    </style>
  </head>
  <body>
    <div id="game"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
